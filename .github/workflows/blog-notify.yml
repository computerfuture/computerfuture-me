name: Blog Notify

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect and notify
        env:
          NOTIFY_URL: "https://cf-admin.cmptrfuture.workers.dev/blog-notify"
          NOTIFY_TOKEN: "f7efd63c370a4eec00b79a835c833a0f"
        run: |
          ADDED=$(git diff --name-status HEAD~1 HEAD -- 'src/posts/published/*.js' | grep '^A' | awk '{print $2}')
          MODIFIED=$(git diff --name-status HEAD~1 HEAD -- 'src/posts/published/*.js' | grep '^M' | awk '{print $2}')

          for file in $ADDED; do
            slug=$(grep -m1 "slug:" "$file" | sed "s/.*slug: '//;s/',.*//;s/'.*//")
            title=$(grep -m1 "title:" "$file" | sed "s/.*title: '//;s/',.*//;s/'.*//")
            url="https://computerfuture.me/posts/$slug"
            curl -s -X POST "$NOTIFY_URL" \
              -H "Content-Type: application/json" \
              -H "x-notify-token: $NOTIFY_TOKEN" \
              -d "{\"type\":\"new\",\"title\":\"$title\",\"url\":\"$url\"}"
          done

          for file in $MODIFIED; do
            slug=$(grep -m1 "slug:" "$file" | sed "s/.*slug: '//;s/',.*//;s/'.*//")
            title=$(grep -m1 "title:" "$file" | sed "s/.*title: '//;s/',.*//;s/'.*//")
            url="https://computerfuture.me/posts/$slug"
            curl -s -X POST "$NOTIFY_URL" \
              -H "Content-Type: application/json" \
              -H "x-notify-token: $NOTIFY_TOKEN" \
              -d "{\"type\":\"updated\",\"title\":\"$title\",\"url\":\"$url\"}"
          done

          # no blog changes — silent
